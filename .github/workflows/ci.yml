name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  VITE_SUPABASE_URL: https://htckswutkpktxclyijwk.supabase.co
  # Public anon key (safe in CI). Override via repo secret if you rotate keys.
  VITE_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        env:
          VITE_ENABLE_PASSWORD_GATE: "false"
        run: npm run build
